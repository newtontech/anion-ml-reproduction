<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="url(#headerGrad)"/>
  <text x="60" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Dataset Overview: 267 PH Anions</text>

  <!-- Three KPI cards -->
  <!-- Card 1: Total Samples -->
  <rect x="60" y="80" width="360" height="110" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="60" y="80" width="360" height="4" rx="2" fill="#1565C0"/>
  <text x="240" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#1565C0" font-weight="bold">267</text>
  <text x="240" y="150" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#5D6D7E">PH Anion Samples</text>
  <text x="240" y="174" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#95A5A6">19 molecular features + 1 binary target</text>

  <!-- Card 2: Class Distribution -->
  <rect x="460" y="80" width="360" height="110" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="460" y="80" width="360" height="4" rx="2" fill="#E74C3C"/>
  <text x="640" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#E74C3C" font-weight="bold">201 : 66</text>
  <text x="640" y="150" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#5D6D7E">High Eb : Low Eb</text>
  <text x="640" y="174" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#95A5A6">75.3% : 24.7% (threshold = 3 eV)</text>

  <!-- Card 3: Feature Categories -->
  <rect x="860" y="80" width="360" height="110" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="860" y="80" width="360" height="4" rx="2" fill="#27AE60"/>
  <text x="1040" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#27AE60" font-weight="bold">4</text>
  <text x="1040" y="150" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#5D6D7E">Feature Categories</text>
  <text x="1040" y="174" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#95A5A6">Electronic · Structural · Elemental · Fundamental</text>

  <!-- Feature categories table -->
  <rect x="60" y="210" width="520" height="210" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
  <text x="80" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">19 Molecular Features</text>
  <line x1="80" y1="250" x2="550" y2="250" stroke="#DCE1E8" stroke-width="1"/>

  <!-- Table header -->
  <rect x="80" y="258" width="160" height="28" rx="4" fill="#1565C0" fill-opacity="0.08"/>
  <text x="160" y="277" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1565C0" font-weight="bold">Category</text>
  <rect x="245" y="258" width="300" height="28" rx="4" fill="#1565C0" fill-opacity="0.08"/>
  <text x="395" y="277" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#1565C0" font-weight="bold">Features (Source)</text>

  <text x="160" y="310" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#2C3E50">Electronic</text>
  <text x="395" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">HOMO, LUMO, min_ESP, max_ESP (Gaussian)</text>

  <line x1="80" y1="320" x2="550" y2="320" stroke="#DCE1E8" stroke-width="0.5"/>

  <text x="160" y="340" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#2C3E50">Structural</text>
  <text x="395" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">R, La, Lb, Lc, MPI (Multiwfn)</text>

  <line x1="80" y1="350" x2="550" y2="350" stroke="#DCE1E8" stroke-width="0.5"/>

  <text x="160" y="370" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#2C3E50">Elemental</text>
  <text x="395" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">num_O, num_S, num_F, num_P, num_B, num_C</text>

  <line x1="80" y1="380" x2="550" y2="380" stroke="#DCE1E8" stroke-width="0.5"/>

  <text x="160" y="400" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#2C3E50">Fundamental</text>
  <text x="395" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5D6D7E">MW, TPSA, HBA, Complexity (PubChem)</text>

  <!-- Right: Correlation chart image -->
  <g id="corr-image">
    <rect x="610" y="210" width="610" height="430" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
    <text x="915" y="240" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50" font-weight="bold">Feature–Target Correlation</text>
    <image href="../images/feature_target_corr.png" x="640" y="255" width="555" height="370" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Bottom: Class distribution mini bar -->
  <rect x="60" y="440" width="520" height="70" rx="8" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1"/>
  <text x="80" y="466" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E" font-weight="bold">Target Distribution</text>
  <rect x="80" y="478" width="484" height="20" rx="4" fill="#DCE1E8"/>
  <rect x="80" y="478" width="365" height="20" rx="4" fill="#E74C3C"/>
  <text x="335" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">High Eb: 75.3%</text>
  <text x="500" y="493" font-family="Arial, sans-serif" font-size="12" fill="#5D6D7E">24.7%</text>

  <!-- Bottom: Feature distribution note -->
  <rect x="60" y="530" width="520" height="110" rx="8" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1"/>
  <text x="80" y="556" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="bold">Highly Correlated Pairs (|r| > 0.85)</text>
  <text x="100" y="580" font-family="Arial, sans-serif" font-size="14" fill="#E74C3C">MPI ↔ La : r = 0.96</text>
  <text x="100" y="604" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">→ Both removed in Round 1 (redundant)</text>
  <text x="100" y="628" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">→ Remaining: 17 features</text>

  <!-- Footer -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">Source: DFT calculations from Xu et al. (2023) Supplementary Data</text>
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">03</text>
</svg>