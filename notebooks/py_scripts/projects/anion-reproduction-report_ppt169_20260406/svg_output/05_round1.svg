<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="url(#headerGrad)"/>
  <text x="60" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Round 1: 5 Models with 17 Features</text>

  <!-- Takeaway -->
  <rect x="60" y="78" width="1160" height="42" rx="6" fill="#1565C0" fill-opacity="0.06"/>
  <text x="80" y="104" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1565C0">Random Forest achieves best single-split AUC (0.96), but 10-fold CV reveals generalization gap (0.75)</text>

  <!-- Results Table -->
  <g id="results-table">
    <rect x="60" y="140" width="700" height="240" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>

    <!-- Table header -->
    <rect x="60" y="140" width="700" height="36" rx="10" fill="#1565C0"/>
    <rect x="60" y="160" width="700" height="16" fill="#1565C0"/>
    <text x="140" y="164" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Model</text>
    <text x="440" y="164" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">AUC</text>
    <text x="580" y="164" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Accuracy</text>

    <!-- Row 1 - RF (best) -->
    <rect x="60" y="176" width="700" height="40" fill="#E74C3C" fill-opacity="0.06"/>
    <text x="140" y="201" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50" font-weight="bold">Random Forest</text>
    <text x="440" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E74C3C" font-weight="bold">0.9581</text>
    <text x="580" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8780</text>
    <!-- Best badge -->
    <rect x="680" y="188" width="56" height="22" rx="11" fill="#E74C3C" fill-opacity="0.15"/>
    <text x="708" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" font-weight="bold">BEST</text>

    <!-- Row 2 -->
    <rect x="60" y="216" width="700" height="40" fill="#FFFFFF"/>
    <text x="140" y="241" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50">Gradient Boosting</text>
    <text x="440" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.9516</text>
    <text x="580" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8293</text>

    <!-- Row 3 -->
    <rect x="60" y="256" width="700" height="40" fill="#F5F7FA"/>
    <text x="140" y="281" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50">XGBoost</text>
    <text x="440" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.9387</text>
    <text x="580" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8537</text>

    <!-- Row 4 -->
    <rect x="60" y="296" width="700" height="40" fill="#FFFFFF"/>
    <text x="140" y="321" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50">SVC (RBF)</text>
    <text x="440" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8839</text>
    <text x="580" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8780</text>

    <!-- Row 5 -->
    <rect x="60" y="336" width="700" height="40" rx="0" fill="#F5F7FA"/>
    <rect x="60" y="360" width="700" height="20" rx="10" fill="#F5F7FA"/>
    <text x="140" y="361" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50">Logistic Regression</text>
    <text x="440" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8774</text>
    <text x="580" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2C3E50">0.8537</text>
  </g>

  <!-- CV Result Box -->
  <rect x="790" y="140" width="430" height="110" rx="10" fill="#FFFFFF" stroke="#E74C3C" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="1005" y="170" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#5D6D7E">Random Forest 10-fold CV</text>
  <text x="1005" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#E74C3C" font-weight="bold">0.7486 ± 0.0772</text>
  <text x="1005" y="238" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#5D6D7E">AUC (StratifiedShuffleSplit)</text>

  <!-- AUC Bar chart visualization -->
  <g id="auc-bars">
    <rect x="790" y="270" width="430" height="200" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
    <text x="1005" y="296" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="bold">AUC Comparison (17 Features)</text>

    <!-- Bars -->
    <rect x="810" y="340" width="60" height="110" rx="3" fill="#E74C3C"/>
    <text x="840" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C" font-weight="bold">0.96</text>
    <text x="840" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5D6D7E">RF</text>

    <rect x="885" y="348" width="60" height="102" rx="3" fill="#1565C0"/>
    <text x="915" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0" font-weight="bold">0.95</text>
    <text x="915" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5D6D7E">GB</text>

    <rect x="960" y="356" width="60" height="94" rx="3" fill="#1565C0" fill-opacity="0.7"/>
    <text x="990" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0" font-weight="bold">0.94</text>
    <text x="990" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5D6D7E">XGB</text>

    <rect x="1035" y="402" width="60" height="48" rx="3" fill="#1565C0" fill-opacity="0.5"/>
    <text x="1065" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0">0.88</text>
    <text x="1065" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5D6D7E">SVC</text>

    <rect x="1110" y="405" width="60" height="45" rx="3" fill="#1565C0" fill-opacity="0.4"/>
    <text x="1140" y="399" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565C0">0.88</text>
    <text x="1140" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5D6D7E">LR</text>

    <!-- Scale -->
    <line x1="805" y1="450" x2="1175" y2="450" stroke="#DCE1E8" stroke-width="1"/>
  </g>

  <!-- Feature Importance image -->
  <rect x="60" y="400" width="700" height="280" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
  <text x="410" y="426" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50" font-weight="bold">Random Forest Feature Importance (Round 1)</text>
  <image href="../images/feature_importance_r1.png" x="85" y="438" width="650" height="230" preserveAspectRatio="xMidYMid meet"/>

  <!-- Footer -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">Source: scikit-learn RandomForestClassifier (n_estimators=100, random_state=42)</text>
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">05</text>
</svg>