<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="url(#headerGrad)"/>
  <text x="60" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Reproduction Summary</text>

  <!-- Three summary columns -->
  <!-- Column 1: Dataset -->
  <rect x="60" y="80" width="360" height="200" rx="12" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="60" y="80" width="360" height="6" rx="3" fill="#1565C0"/>
  <text x="240" y="118" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#5D6D7E">Dataset</text>
  <text x="240" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#1565C0" font-weight="bold">267</text>
  <text x="240" y="178" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">PH Anion Samples</text>
  <line x1="100" y1="195" x2="380" y2="195" stroke="#DCE1E8" stroke-width="1"/>
  <text x="240" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2C3E50">19 → 17 → <tspan fill="#E74C3C" font-weight="bold">4</tspan> features</text>
  <text x="240" y="245" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">76% feature reduction</text>
  <text x="240" y="268" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">85/15 stratified split</text>

  <!-- Column 2: Best Model -->
  <rect x="460" y="80" width="360" height="200" rx="12" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="460" y="80" width="360" height="6" rx="3" fill="#27AE60"/>
  <text x="640" y="118" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#5D6D7E">Best Model (4 Features)</text>
  <text x="640" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#27AE60" font-weight="bold">0.9161</text>
  <text x="640" y="178" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">Gradient Boosting AUC</text>
  <line x1="500" y1="195" x2="780" y2="195" stroke="#DCE1E8" stroke-width="1"/>
  <text x="640" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2C3E50">Accuracy: <tspan fill="#27AE60" font-weight="bold">95.12%</tspan></text>
  <text x="640" y="245" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">XGBoost: AUC = 0.9161</text>
  <text x="640" y="268" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">RF: AUC = 0.8984</text>

  <!-- Column 3: Paper Comparison -->
  <rect x="860" y="80" width="360" height="200" rx="12" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="860" y="80" width="360" height="6" rx="3" fill="#E74C3C"/>
  <text x="1040" y="118" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#5D6D7E">Paper Target (RF, 4 feat)</text>
  <text x="1040" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#E74C3C" font-weight="bold">0.87</text>
  <text x="1040" y="178" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">AUC ± 0.06 (10-fold CV)</text>
  <line x1="900" y1="195" x2="1180" y2="195" stroke="#DCE1E8" stroke-width="1"/>
  <text x="1040" y="218" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">Our RF CV: <tspan fill="#E74C3C">0.78 ± 0.07</tspan></text>
  <text x="1040" y="245" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Paper Accuracy: 0.84</text>
  <text x="1040" y="268" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Our RF CV Acc: 0.80 ± 0.05</text>

  <!-- Key Findings Section -->
  <rect x="60" y="300" width="1160" height="260" rx="12" fill="#FFFFFF" stroke="#27AE60" stroke-width="2" filter="url(#cardShadow)"/>
  <text x="100" y="334" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#27AE60" font-weight="bold">Key Findings Confirmed</text>
  <line x1="100" y1="348" x2="1180" y2="348" stroke="#DCE1E8" stroke-width="1"/>

  <!-- Finding 1 -->
  <rect x="100" y="362" width="520" height="70" rx="8" fill="#E74C3C" fill-opacity="0.04"/>
  <circle cx="130" cy="397" r="18" fill="#E74C3C"/>
  <text x="130" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">O</text>
  <text x="160" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">num_O ↑ → Stronger Eb</text>
  <text x="160" y="414" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">More oxygen → more Pb²⁺ coordination sites</text>

  <!-- Finding 2 -->
  <rect x="650" y="362" width="530" height="70" rx="8" fill="#3498DB" fill-opacity="0.04"/>
  <circle cx="680" cy="397" r="18" fill="#3498DB"/>
  <text x="680" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">PS</text>
  <text x="710" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">TPSA ↑ → Stronger Eb</text>
  <text x="710" y="414" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Larger polar surface → more hydrogen bonding</text>

  <!-- Finding 3 -->
  <rect x="100" y="445" width="520" height="70" rx="8" fill="#27AE60" fill-opacity="0.04"/>
  <circle cx="130" cy="480" r="18" fill="#27AE60"/>
  <text x="130" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">H</text>
  <text x="160" y="473" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">HBA ↑ → Stronger Eb</text>
  <text x="160" y="497" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">More H-bond acceptors → stronger surface interaction</text>

  <!-- Finding 4 -->
  <rect x="650" y="445" width="530" height="70" rx="8" fill="#F39C12" fill-opacity="0.04"/>
  <circle cx="680" cy="480" r="18" fill="#F39C12"/>
  <text x="680" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">HO</text>
  <text x="710" y="473" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">HOMO ↓ → Stronger Eb</text>
  <text x="710" y="497" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Lower HOMO → higher electronegativity → stronger binding</text>

  <!-- Status bar -->
  <rect x="60" y="580" width="1160" height="60" rx="10" fill="url(#successGrad)" fill-opacity="0.08" stroke="#27AE60" stroke-width="1" stroke-opacity="0.3"/>
  <text x="640" y="610" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#27AE60" font-weight="bold">All 4 key findings from the paper successfully reproduced</text>
  <text x="640" y="632" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Physical interpretation consistent with Xu et al. (2023)</text>

  <!-- Footer -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">Source: Reproduction of Xu et al., Nat. Mater. 22, 1507-1514 (2023)</text>
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">11</text>
</svg>