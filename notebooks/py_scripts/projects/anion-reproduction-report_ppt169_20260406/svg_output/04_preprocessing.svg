<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="url(#headerGrad)"/>
  <text x="60" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Feature Engineering &amp; Preprocessing</text>

  <!-- Takeaway -->
  <rect x="60" y="78" width="1160" height="42" rx="6" fill="#1565C0" fill-opacity="0.06"/>
  <text x="80" y="104" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1565C0">3-step pipeline: remove correlated features → stratified split → standardization</text>

  <!-- Left: Pipeline Steps -->
  <g id="pipeline-steps">
    <!-- Step 1 -->
    <rect x="60" y="140" width="560" height="120" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <circle cx="100" cy="180" r="22" fill="#E74C3C"/>
    <text x="100" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">1</text>
    <text x="136" y="172" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#2C3E50" font-weight="bold">Remove Highly Correlated Features</text>
    <text x="136" y="196" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#5D6D7E">Drop MPI &amp; La (r = 0.96, |r| &gt; 0.85 threshold)</text>
    <rect x="136" y="210" width="80" height="28" rx="14" fill="#E74C3C" fill-opacity="0.1"/>
    <text x="176" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E74C3C" font-weight="bold">19 → 17</text>
    <text x="226" y="229" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">features</text>

    <!-- Arrow -->
    <line x1="340" y1="260" x2="340" y2="280" stroke="#1565C0" stroke-width="2"/>
    <polygon points="340,288 335,280 345,280" fill="#1565C0"/>

    <!-- Step 2 -->
    <rect x="60" y="288" width="560" height="130" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <circle cx="100" cy="332" r="22" fill="#1565C0"/>
    <text x="100" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">2</text>
    <text x="136" y="322" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#2C3E50" font-weight="bold">Stratified Train/Test Split</text>
    <text x="136" y="346" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#5D6D7E">StratifiedShuffleSplit (85% / 15%)</text>
    <!-- Split visualization -->
    <rect x="136" y="362" width="350" height="24" rx="4" fill="#DCE1E8"/>
    <rect x="136" y="362" width="298" height="24" rx="4" fill="#1565C0" fill-opacity="0.2"/>
    <rect x="136" y="362" width="298" height="24" rx="4" fill="none" stroke="#1565C0" stroke-width="1"/>
    <text x="285" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565C0" font-weight="bold">Train: 226 (85%)</text>
    <text x="462" y="379" font-family="Arial, sans-serif" font-size="12" fill="#5D6D7E">41</text>
    <text x="500" y="346" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#5D6D7E">Train: High=170, Low=56</text>
    <text x="500" y="362" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#5D6D7E">Test: High=31, Low=10</text>

    <!-- Arrow -->
    <line x1="340" y1="418" x2="340" y2="438" stroke="#27AE60" stroke-width="2"/>
    <polygon points="340,446 335,438 345,438" fill="#27AE60"/>

    <!-- Step 3 -->
    <rect x="60" y="446" width="560" height="90" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <circle cx="100" cy="484" r="22" fill="#27AE60"/>
    <text x="100" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">3</text>
    <text x="136" y="478" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#2C3E50" font-weight="bold">Standardization</text>
    <text x="136" y="502" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#5D6D7E">Zero mean, unit variance (fit on train, transform test)</text>
    <text x="136" y="522" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#95A5A6">StandardScaler from scikit-learn</text>
  </g>

  <!-- Right: Correlation matrix image -->
  <g id="corr-matrix">
    <rect x="650" y="140" width="570" height="540" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
    <text x="935" y="170" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50" font-weight="bold">Feature Correlation Matrix (19 Features)</text>
    <image href="../images/corr_matrix_all19.png" x="680" y="185" width="520" height="480" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Footer -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">Source: Correlation analysis on 267 PH anion dataset</text>
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">04</text>
</svg>