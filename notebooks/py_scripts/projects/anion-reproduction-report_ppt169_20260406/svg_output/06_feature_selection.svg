<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="url(#headerGrad)"/>
  <text x="60" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Feature Selection: Top 4 Features</text>

  <!-- Takeaway -->
  <rect x="60" y="78" width="1160" height="42" rx="6" fill="#E74C3C" fill-opacity="0.06"/>
  <text x="80" y="104" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#E74C3C">4 key molecular descriptors explain anion binding: num_O, TPSA, HBA, HOMO</text>

  <!-- Left: Feature interpretation cards -->
  <g id="feature-cards">
    <!-- num_O -->
    <rect x="60" y="140" width="560" height="105" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="60" y="140" width="6" height="105" rx="3" fill="#E74C3C"/>
    <text x="90" y="170" font-family="Arial, sans-serif" font-size="24" fill="#E74C3C" font-weight="bold">num_O</text>
    <text x="210" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#27AE60" font-weight="bold">↑ Positive</text>
    <text x="90" y="196" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">More oxygen atoms → more coordination sites with Pb²⁺</text>
    <text x="90" y="218" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Oxygen-rich anions form stronger bonds with perovskite surface lead atoms</text>
    <text x="90" y="236" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#95A5A6">LR coefficient: positive direction → higher Eb</text>

    <!-- TPSA -->
    <rect x="60" y="258" width="560" height="105" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="60" y="258" width="6" height="105" rx="3" fill="#3498DB"/>
    <text x="90" y="288" font-family="Arial, sans-serif" font-size="24" fill="#3498DB" font-weight="bold">TPSA</text>
    <text x="210" y="288" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#27AE60" font-weight="bold">↑ Positive</text>
    <text x="90" y="314" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">Larger polar surface area → more hydrogen bonding interactions</text>
    <text x="90" y="336" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Topological Polar Surface Area measures hydrogen bonding capacity</text>
    <text x="90" y="354" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#95A5A6">LR coefficient: positive direction → higher Eb</text>

    <!-- HBA -->
    <rect x="60" y="376" width="560" height="105" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="60" y="376" width="6" height="105" rx="3" fill="#27AE60"/>
    <text x="90" y="406" font-family="Arial, sans-serif" font-size="24" fill="#27AE60" font-weight="bold">HBA</text>
    <text x="210" y="406" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#27AE60" font-weight="bold">↑ Positive</text>
    <text x="90" y="432" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">More H-bond acceptors → stronger interaction with surface</text>
    <text x="90" y="454" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Hydrogen Bond Acceptors directly relate to surface binding strength</text>
    <text x="90" y="472" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#95A5A6">LR coefficient: positive direction → higher Eb</text>

    <!-- HOMO -->
    <rect x="60" y="494" width="560" height="105" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>
    <rect x="60" y="494" width="6" height="105" rx="3" fill="#F39C12"/>
    <text x="90" y="524" font-family="Arial, sans-serif" font-size="24" fill="#F39C12" font-weight="bold">HOMO</text>
    <text x="210" y="524" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#E74C3C" font-weight="bold">↓ Negative</text>
    <text x="90" y="550" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">Lower HOMO → higher electronegativity → stronger Eb</text>
    <text x="90" y="572" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#5D6D7E">Highest Occupied Molecular Orbital energy from Gaussian calculations</text>
    <text x="90" y="590" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#95A5A6">LR coefficient: negative direction → lower HOMO = higher Eb</text>
  </g>

  <!-- Right: LR Coefficients image -->
  <g id="lr-coefficients">
    <rect x="650" y="140" width="570" height="290" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
    <text x="935" y="170" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#2C3E50" font-weight="bold">Logistic Regression Coefficients (Round 1)</text>
    <image href="../images/lr_coefficients_round1.png" x="680" y="185" width="510" height="230" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Summary box -->
  <rect x="650" y="450" width="570" height="150" rx="10" fill="#1565C0" fill-opacity="0.05" stroke="#1565C0" stroke-width="1" stroke-opacity="0.2"/>
  <text x="935" y="480" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#1565C0" font-weight="bold">Physical Interpretation Summary</text>
  <text x="670" y="510" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">• Anions with more O atoms bind more strongly to Pb²⁺ surface</text>
  <text x="670" y="536" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">• Larger polar surface area enables stronger hydrogen bonding</text>
  <text x="670" y="562" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">• More H-bond acceptors provide additional interaction pathways</text>
  <text x="670" y="588" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">• Lower HOMO = higher electronegativity → stronger electron donation</text>

  <!-- Footer -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">Source: RF importance + LR coefficients from 17-feature Round 1 training</text>
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">06</text>
</svg>