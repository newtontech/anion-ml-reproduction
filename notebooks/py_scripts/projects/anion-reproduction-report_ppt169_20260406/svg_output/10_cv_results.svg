<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.10"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="60" fill="url(#headerGrad)"/>
  <text x="60" y="38" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Cross-Validation Results (10-fold)</text>

  <!-- Takeaway -->
  <rect x="60" y="78" width="1160" height="42" rx="6" fill="#1565C0" fill-opacity="0.06"/>
  <text x="80" y="104" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1565C0">10-fold StratifiedShuffleSplit reveals realistic generalization: AUC 0.75 (R1) → 0.78 (R2)</text>

  <!-- Left: Round 1 Mean ROC -->
  <rect x="60" y="140" width="580" height="400" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
  <text x="350" y="170" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">Round 1: 17 Features (RF)</text>
  <image href="../images/roc_mean_cv.png" x="100" y="185" width="500" height="330" preserveAspectRatio="xMidYMid meet"/>

  <!-- AUC badge R1 -->
  <rect x="180" y="510" width="340" height="30" rx="15" fill="#1565C0" fill-opacity="0.1"/>
  <text x="350" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1565C0" font-weight="bold">AUC = 0.7486 ± 0.0772</text>

  <!-- Right: Round 2 Mean ROC -->
  <rect x="660" y="140" width="560" height="400" rx="10" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="1"/>
  <text x="940" y="170" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">Round 2: 4 Features (RF)</text>
  <image href="../images/roc_mean_cv_r2.png" x="700" y="185" width="480" height="330" preserveAspectRatio="xMidYMid meet"/>

  <!-- AUC badge R2 -->
  <rect x="770" y="510" width="340" height="30" rx="15" fill="#27AE60" fill-opacity="0.1"/>
  <text x="940" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#27AE60" font-weight="bold">AUC = 0.7817 ± 0.0679</text>

  <!-- Comparison table -->
  <rect x="60" y="560" width="1160" height="110" rx="10" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Table header -->
  <rect x="60" y="560" width="1160" height="32" rx="10" fill="#2C3E50"/>
  <rect x="60" y="576" width="1160" height="16" fill="#2C3E50"/>
  <text x="200" y="581" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">Metric</text>
  <text x="460" y="581" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">Round 1 (17 feat)</text>
  <text x="720" y="581" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">Round 2 (4 feat)</text>
  <text x="980" y="581" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">Paper (4 feat)</text>

  <!-- Row: AUC -->
  <rect x="60" y="592" width="1160" height="34" fill="#F5F7FA"/>
  <text x="200" y="614" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">10-fold CV AUC</text>
  <text x="460" y="614" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1565C0" font-weight="bold">0.7486 ± 0.0772</text>
  <text x="720" y="614" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#27AE60" font-weight="bold">0.7817 ± 0.0679</text>
  <text x="980" y="614" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E74C3C" font-weight="bold">0.87 ± 0.06</text>

  <!-- Row: Accuracy -->
  <rect x="60" y="626" width="1160" height="34" rx="0" fill="#FFFFFF"/>
  <rect x="60" y="640" width="1160" height="30" rx="10" fill="#FFFFFF"/>
  <text x="200" y="648" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#2C3E50">10-fold CV Accuracy</text>
  <text x="460" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1565C0" font-weight="bold">0.8029 ± 0.0437</text>
  <text x="720" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#27AE60" font-weight="bold">0.7971 ± 0.0533</text>
  <text x="980" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E74C3C" font-weight="bold">0.84</text>

  <!-- Footer -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">Source: 10-fold StratifiedShuffleSplit, test_size=0.15, RandomForestClassifier(n_estimators=100)</text>
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#95A5A6">10</text>
</svg>