<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <radialGradient id="bgDecor" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.12"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgDecor)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1280" height="8" fill="url(#headerGrad)"/>

  <!-- Decorative geometric elements -->
  <rect x="1050" y="80" width="180" height="180" rx="16" fill="#1565C0" fill-opacity="0.04" transform="rotate(15, 1140, 170)"/>
  <rect x="1100" y="400" width="120" height="120" rx="12" fill="#1976D2" fill-opacity="0.06" transform="rotate(-10, 1160, 460)"/>
  <circle cx="1200" cy="600" r="80" fill="#1565C0" fill-opacity="0.03"/>

  <!-- Main content area -->
  <g id="main-content">
    <!-- Paper icon -->
    <rect x="570" y="120" width="140" height="170" rx="8" fill="#F5F7FA" stroke="#DCE1E8" stroke-width="2"/>
    <rect x="570" y="120" width="140" height="40" rx="8" fill="#1565C0"/>
    <rect x="575" y="120" width="130" height="20" rx="0" fill="#1565C0"/>
    <text x="640" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Nat. Mater.</text>
    <!-- Paper lines -->
    <line x1="590" y1="180" x2="690" y2="180" stroke="#DCE1E8" stroke-width="1.5"/>
    <line x1="590" y1="200" x2="680" y2="200" stroke="#DCE1E8" stroke-width="1.5"/>
    <line x1="590" y1="220" x2="700" y2="220" stroke="#DCE1E8" stroke-width="1.5"/>
    <line x1="590" y1="240" x2="660" y2="240" stroke="#DCE1E8" stroke-width="1.5"/>
    <line x1="590" y1="260" x2="685" y2="260" stroke="#DCE1E8" stroke-width="1.5"/>

    <!-- Main title -->
    <text x="640" y="370" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" fill="#0D47A1" font-weight="bold">Anion Optimization for Bifunctional</text>
    <text x="640" y="418" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" fill="#0D47A1" font-weight="bold">Surface Passivation in Perovskite Solar Cells</text>

    <!-- Subtitle -->
    <text x="640" y="470" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#5D6D7E">ML Workflow Reproduction Report</text>

    <!-- Divider line -->
    <line x1="440" y1="500" x2="840" y2="500" stroke="#1565C0" stroke-width="2" stroke-opacity="0.3"/>

    <!-- Paper reference -->
    <text x="640" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5D6D7E">Xu, J. et al. Nat. Mater. 22, 1507–1514 (2023)</text>
    <text x="640" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#95A5A6">DOI: 10.1038/s41563-023-01705-y</text>

    <!-- Date -->
    <text x="640" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#95A5A6">2026-04-06</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="712" width="1280" height="8" fill="url(#headerGrad)"/>
</svg>